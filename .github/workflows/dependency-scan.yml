name: dependency-scan

on: 
    workflow_call

jobs:
    job1:
        runs-on: ubuntu-latest
        steps:
            - name: checkout code
              uses: actions/checkout@v6

            - name: setup python 3.12
              uses: actions/setup-python@v5
              with:
                python-version: 3.12
            - name: Install pip audit
              run: pip install pip-audit
            - name: Run the file
              run: pip-audit -r requirements.txt
