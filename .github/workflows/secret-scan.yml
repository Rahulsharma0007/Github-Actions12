name: secret-scan

on:
    workflow_call

jobs:
    job1:
        runs-on: ubuntu-latest
        steps:
            - name: checkout code
              uses: actions/checkout@v6
              with:
                fetch-depth: 0
            - name: Scan the code with gitleaks
              uses: gitleaks/gitleaks-action@v2
              env:
               GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
              